version: '3.9'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: signoff-db
    environment:
      POSTGRES_USER: signoff_user
      POSTGRES_PASSWORD: signoff_pass_123
      POSTGRES_DB: signoff_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U signoff_user -d signoff_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - signoff-network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: signoff-redis
    command: redis-server --appendonly yes --requirepass signoff_redis_pass
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - signoff-network

  # RabbitMQ Message Queue
  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    container_name: signoff-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: signoff
      RABBITMQ_DEFAULT_PASS: signoff_rabbit_pass
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - signoff-network

  # MinIO S3-Compatible Storage
  minio:
    image: minio/minio:latest
    container_name: signoff-storage
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - signoff-network

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: signoff-nginx
    ports:
      - "80:80"
    volumes:
      - ./local-setup/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
    networks:
      - signoff-network
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:
  minio_data:

networks:
  signoff-network:
    driver: bridge
